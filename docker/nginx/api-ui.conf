worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    upstream graph_api    { server 127.0.0.1:4000; keepalive 32; }
    upstream insights_api { server 127.0.0.1:4001; keepalive 16; }
    upstream eventing_api { server 127.0.0.1:4002; keepalive 8;  }

    server {
        listen 8888;
        server_name _;

        location = /health {
            access_log off;
            return 200 '{"status":"ok","service":"flowcore-api-ui"}';
            add_header Content-Type application/json;
        }

        # GraphQL HTTP
        location = /graphql {
            proxy_pass         http://graph_api;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        # GraphQL WebSocket
        location = /graphql-ws {
            proxy_pass         http://graph_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_read_timeout 3600s;
        }

        # Insights REST API
        location /api/insights/ {
            rewrite ^/api/insights/(.*)$ /$1 break;
            proxy_pass http://insights_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # Eventing REST API
        location /api/eventing/ {
            rewrite ^/api/eventing/(.*)$ /$1 break;
            proxy_pass http://eventing_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # NOC Frontend — serve built React SPA
        location / {
            root /var/www/noc-frontend;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Frontend static assets with long cache
        location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
            root /var/www/noc-frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
