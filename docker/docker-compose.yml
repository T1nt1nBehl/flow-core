version: "3.9"

# =============================================================================
# FlowCore Persistent Stores — Docker Compose
# Starts: PostgreSQL (Layer 2+4), TimescaleDB (Layer 3), Neo4j (Layer 1)
#
# Run from the flowcore/ ROOT directory:
#   docker compose -f docker/docker-compose.yml up -d
#
# The schema DDL is NOT applied via initdb mounts here because initdb only
# runs on a fresh (empty) volume, making it unreliable for re-runs.
# Schema is applied explicitly by run_all.sh via docker exec instead.
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 15 — Layer 2 (Source Normalisation) + Layer 4 (Agent Outputs)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: flowcore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       flowcore
      POSTGRES_USER:     flowcore
      POSTGRES_PASSWORD: flowcore_secret
      PGDATA:            /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowcore -d flowcore"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - flowcore-net

  # ---------------------------------------------------------------------------
  # TimescaleDB 2.x on PostgreSQL 15 — Layer 3 (Telemetry & Live State)
  # ---------------------------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: flowcore-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB:       flowcore_ts
      POSTGRES_USER:     flowcore
      POSTGRES_PASSWORD: flowcore_secret
      PGDATA:            /var/lib/postgresql/data/pgdata
      # Required: preload timescaledb background worker before any connection
      # Without this, create_hypertable() fails even though the extension installs.
      TIMESCALEDB_TELEMETRY: "off"
    command: >
      postgres
      -c shared_preload_libraries=timescaledb
      -c timescaledb.telemetry_level=off
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowcore -d flowcore_ts"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - flowcore-net

  # ---------------------------------------------------------------------------
  # Neo4j 5 Community — Layer 1 (Canonical Physical Registry / Knowledge Graph)
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: flowcore-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH:                          neo4j/flowcore_secret
      NEO4J_PLUGINS:                       '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size:    1G
      NEO4J_dbms_memory_pagecache_size:    512m
      NEO4J_server_default__listen__address: 0.0.0.0
    ports:
      - "7474:7474"   # Neo4j Browser
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7474"]
      interval: 10s
      timeout: 10s
      retries: 20
    networks:
      - flowcore-net

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
  timescale_data:
  neo4j_data:
  neo4j_logs:

# ---------------------------------------------------------------------------
# Internal network
# ---------------------------------------------------------------------------
networks:
  flowcore-net:
    driver: bridge

