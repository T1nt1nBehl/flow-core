# =============================================================================
# FlowCore API Container — nginx reverse proxy
# Single external port 8000 routes to all internal API services and the
# NOC frontend. WebSocket upgrade is supported for GraphQL subscriptions.
#
# Routing:
#   /graphql          → graph-api-service  :4000  (GraphQL + WS subscriptions)
#   /api/insights     → insights-api-service :4001 (REST — drift, classification)
#   /api/events       → eventing-integration :4002 (REST — ITSM webhooks)
#   /                 → noc-frontend        :3000  (React SPA)
# =============================================================================

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_method $request_uri $status '
                    '$body_bytes_sent "$http_referer" '
                    '"$http_user_agent" ${request_time}s';

    access_log /var/log/nginx/access.log main;
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # WebSocket upgrade map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream graph_api {
        server 127.0.0.1:4000;
        keepalive 32;
    }

    upstream insights_api {
        server 127.0.0.1:4001;
        keepalive 16;
    }

    upstream eventing_api {
        server 127.0.0.1:4002;
        keepalive 8;
    }

    upstream noc_frontend {
        server 127.0.0.1:3000;
        keepalive 16;
    }

    server {
        listen 8000;
        server_name _;

        # ── GraphQL API + WebSocket subscriptions ─────────────────────────────
        location /graphql {
            proxy_pass         http://graph_api;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 3600s;   # keep WS connections alive
            proxy_send_timeout 3600s;
        }

        # ── Insights REST API ─────────────────────────────────────────────────
        location /api/insights/ {
            proxy_pass         http://insights_api/;
            proxy_http_version 1.1;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── Eventing / ITSM integration REST API ──────────────────────────────
        location /api/events/ {
            proxy_pass         http://eventing_api/;
            proxy_http_version 1.1;
            proxy_set_header   Host      $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── NOC frontend (React SPA — catch-all, must be last) ────────────────
        location / {
            proxy_pass         http://noc_frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
        }

        # ── Health endpoint (nginx-level, no upstream needed) ─────────────────
        location /nginx-health {
            access_log off;
            return 200 '{"status":"ok","component":"nginx"}';
            add_header Content-Type application/json;
        }
    }
}
